---
services:
  a2a-server:
    image: ghcr.io/inference-gateway/mock-agent:latest
    pull_policy: always
    environment:
      A2A_AGENT_URL: 'http://a2a-server:8080'
    networks:
      - a2a-network

  a2a-debugger:
    # image: ghcr.io/inference-gateway/a2a-debugger:latest
    build:
      context: ..
      dockerfile: Dockerfile
    pull_policy: always
    entrypoint:
      - /a2a
      - --config
      - /config/.a2a.yaml
    command:
      - config
      - set
      - server-url
      - http://a2a-server:8080
    volumes:
      - ./config:/config
    depends_on:
      a2a-server:
        condition: service_started
    networks:
      - a2a-network

networks:
  a2a-network:
    driver: bridge
